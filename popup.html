<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bypass Helper</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Bypass Helper</h1>
            <p class="version">v1.2.0</p>
        </header>
        
        <main>
            <div class="control-group">
                <div class="label-group">
                    <span class="control-label">Enable Extension</span>
                    <span class="control-desc">Turn bypass functionality on or off</span>
                </div>
                <label class="switch">
                    <input type="checkbox" id="enabled-toggle">
                    <span class="slider round"></span>
                </label>
            </div>

            <div class="control-group">
                <div class="label-group">
                    <span class="control-label">Loop Prevention</span>
                    <span class="control-desc">Pause if too many actions</span>
                </div>
                <label class="switch">
                    <input type="checkbox" id="loop-toggle">
                    <span class="slider round"></span>
                </label>
            </div>

            <div class="control-group">
                <div class="label-group">
                    <span class="control-label">Debug Logging</span>
                    <span class="control-desc">Log actions to browser console</span>
                </div>
                <label class="switch">
                    <input type="checkbox" id="debug-toggle">
                    <span class="slider round"></span>
                </label>
            </div>

            <!-- Per-site disable button -->
            <button class="site-btn" id="site-toggle-btn">
                <span id="site-toggle-icon">🚫</span>
                <span id="site-toggle-text">Disable on this site</span>
            </button>
            <p class="site-hostname" id="site-hostname"></p>

            <!-- Excluded sites notepad -->
            <div class="notepad-section">
                <div class="notepad-header">
                    <span class="notepad-title">Excluded Sites</span>
                    <span class="notepad-hint">One hostname per line</span>
                </div>
                <textarea id="excluded-textarea" spellcheck="false" placeholder="example.com&#10;blog.example.org&#10;ads.website.net"></textarea>
                <div class="notepad-actions">
                    <span class="notepad-count" id="excluded-count">0 sites</span>
                    <button class="save-btn" id="save-excluded">Save</button>
                </div>
                <div class="save-status" id="save-status"></div>
            </div>
            
            <div class="status-message" id="status-msg">
                Extension is active
            </div>
        </main>
        
        <footer>
            <a href="https://github.com/saahiyo/bypassHelper" target="_blank">GitHub</a>
            <span class="separator">•</span>
            <a href="https://github.com/saahiyo/bypassHelper/issues" target="_blank">Report Issue</a>
        </footer>
    </div>
    <script src="popup.js"></script>
</body>
</html>
