<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bypass Helper</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="brand">
                <img class="logo" src="icon48.png" alt="logo">
                <span class="title">Bypass Helper</span>
            </div>
            <span class="version-tag">v1.3.0</span>
        </header>

        <!-- Stats Panel -->
        <div class="stats-panel">
            <div class="stat-cell">
                <span class="stat-label">TODAY</span>
                <span class="stat-value" id="stat-today">0</span>
            </div>
            <div class="stat-cell-divider"></div>
            <div class="stat-cell">
                <span class="stat-label">TOTAL</span>
                <span class="stat-value" id="stat-total">0</span>
            </div>
        </div>

        <main class="app-main">
            <!-- Settings Group Panel -->
            <div class="settings-group">
                <div class="setting-row">
                    <div class="setting-info">
                        <label class="setting-title" for="enabled-toggle">Enable Extension</label>
                        <span class="setting-desc">Turn bypass functionality on/off</span>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox" id="enabled-toggle">
                        <span class="toggle-slider"></span>
                    </label>
                </div>

                <div class="setting-row">
                    <div class="setting-info">
                        <label class="setting-title" for="loop-toggle">Loop Prevention</label>
                        <span class="setting-desc">Pause if too many actions</span>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox" id="loop-toggle">
                        <span class="toggle-slider"></span>
                    </label>
                </div>

                <div class="setting-row">
                    <div class="setting-info">
                        <label class="setting-title" for="debug-toggle">Debug Logging</label>
                        <span class="setting-desc">Log actions to browser console</span>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox" id="debug-toggle">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>

            <!-- Page Action Buttons -->
            <div class="actions-section">
                <button class="btn btn-secondary" id="site-toggle-btn">
                    <span class="icon" id="site-toggle-icon">🚫</span>
                    <span class="text" id="site-toggle-text">Disable on this site</span>
                </button>
                <div class="site-hostname" id="site-hostname"></div>
            </div>

            <!-- Excluded Sites Editor -->
            <div class="notepad-container">
                <div class="notepad-bar">
                    <span class="notepad-title">Excluded Domains</span>
                    <span class="notepad-count" id="excluded-count">0 domains</span>
                </div>
                <textarea id="excluded-textarea" spellcheck="false" placeholder="domain.com&#10;another.net"></textarea>
                <div class="notepad-footer">
                    <span class="notepad-hint">One domain per line</span>
                    <button class="btn-save" id="save-excluded">Save Changes</button>
                </div>
                <div class="save-status" id="save-status"></div>
            </div>

            <div class="status-indicator" id="status-msg">
                Extension is active
            </div>
        </main>

        <!-- Footer -->
        <footer class="app-footer">
            <div class="footer-links">
                <a href="https://github.com/saahiyo/bypassHelper" target="_blank">GitHub</a>
                <span class="dot-sep">•</span>
                <a href="https://github.com/saahiyo/bypassHelper/issues" target="_blank">Report Issue</a>
            </div>
        </footer>
    </div>
    <script src="popup.js"></script>
</body>
</html>
