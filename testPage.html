<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bypassHelper Timer Test</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --primary: #38bdf8;
            --secondary: #818cf8;
            --text: #f1f5f9;
            --text-dim: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 500px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .timer-box {
            background: rgba(0, 0, 0, 0.2);
            padding: 2rem;
            border-radius: 20px;
            margin-bottom: 2rem;
        }

        #countdown {
            font-size: 4rem;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            color: var(--primary);
            line-height: 1;
        }

        .label {
            color: var(--text-dim);
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-top: 0.5rem;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            text-align: left;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 0.75rem;
            background: rgba(0, 0, 0, 0.3);
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 2rem;
        }

        .stat-item span {
            color: var(--primary);
            display: block;
        }

        button {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            font-size: 1rem;
        }

        button:disabled {
            background: #334155;
            color: #64748b;
            cursor: not-allowed;
            transform: none !important;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(56, 189, 248, 0.3);
        }

        .status {
            margin-top: 1.5rem;
            font-size: 0.875rem;
            color: var(--secondary);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bypass Test Page</h1>
        
        <div class="timer-box">
            <div id="countdown">10</div>
            <div class="label">Seconds remaining</div>
        </div>

        <div class="stats">
            <div class="stat-item">
                Date.now()
                <span id="date-now">Loading...</span>
            </div>
            <div class="stat-item">
                perf.now()
                <span id="perf-now">Loading...</span>
            </div>
            <div class="stat-item">
                Interval Hits
                <span id="interval-count">0</span>
            </div>
            <div class="stat-item">
                Elapsed
                <span id="elapsed">0s</span>
            </div>
        </div>

        <button id="gate-button" disabled>Please Wait...</button>
        <div id="status" class="status">Waiting for timer...</div>
    </div>

    <script>
        let count = 10;
        const countdownEl = document.getElementById('countdown');
        const button = document.getElementById('gate-button');
        const statusEl = document.getElementById('status');
        const startTime = Date.now();

        // 1. Countdown using setTimeout(..., 1000)
        // With extension, each 1s should feel like 10ms
        function tick() {
            if (count > 0) {
                count--;
                countdownEl.textContent = count;
                setTimeout(tick, 1000);
            } else {
                countdownEl.textContent = '0';
                button.disabled = false;
                button.textContent = 'Access Content';
                statusEl.textContent = 'Gate Unlocked!';
                statusEl.style.color = '#4ade80';
            }
        }
        setTimeout(tick, 1000);

        // 2. Continuous counter using setInterval
        // With extension, this should fire every 50ms (or 10ms depending on override)
        let intervals = 0;
        setInterval(() => {
            intervals++;
            document.getElementById('interval-count').textContent = intervals;
        }, 1000);

        // 3. Stats update
        setInterval(() => {
            document.getElementById('date-now').textContent = Date.now();
            document.getElementById('perf-now').textContent = Math.floor(performance.now());
            document.getElementById('elapsed').textContent = Math.floor((Date.now() - startTime) / 1000) + 's';
        }, 50);

        button.onclick = () => {
            alert('Success! Timer bypassed.');
        };
    </script>
</body>
</html>
